<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ── Viewport / PWA display ───────────────────────────────── -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, shrink-to-fit=no"
    />

    <!-- ── Colour / theme ──────────────────────────────────────── -->
    <meta name="theme-color" content="#103e48" />
    <meta name="msapplication-navbutton-color" content="#103e48" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="color-scheme" content="light" />

    <!-- ── PWA / home-screen / installable ─────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Stomaboard" />
    <meta name="application-name" content="Stomaboard" />

    <!-- ── SEO / sharing ────────────────────────────────────────── -->
    <meta name="description" content="Internal staff workflow and case management for Stomaboard." />
    <meta name="robots" content="noindex, nofollow" />

    <!-- ── Icons ────────────────────────────────────────────────── -->
    <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32"  href="%PUBLIC_URL%/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="96x96"  href="%PUBLIC_URL%/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/icons/icon-192.png" />
    <!-- Apple touch icons — sized entries must appear before the unsized fallback -->
    <link rel="apple-touch-icon" sizes="57x57"   href="%PUBLIC_URL%/icons/icon-72.png" />
    <link rel="apple-touch-icon" sizes="60x60"   href="%PUBLIC_URL%/icons/icon-72.png" />
    <link rel="apple-touch-icon" sizes="72x72"   href="%PUBLIC_URL%/icons/icon-72.png" />
    <link rel="apple-touch-icon" sizes="76x76"   href="%PUBLIC_URL%/icons/icon-96.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="%PUBLIC_URL%/icons/icon-128.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="%PUBLIC_URL%/icons/icon-128.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="%PUBLIC_URL%/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/icons/apple-touch-icon.png" />
    <!-- Unsized fallback (Safari/macOS picks this when no sized match is found) -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/apple-touch-icon.png" />
    <!-- OG / Twitter card -->
    <meta property="og:title"       content="Stomaboard" />
    <meta property="og:description" content="Internal staff workflow and case management." />
    <meta property="og:image"       content="%PUBLIC_URL%/icons/icon-512.png" />
    <meta property="og:type"        content="website" />
    <meta name="twitter:card"       content="summary" />
    <meta name="twitter:title"      content="Stomaboard" />
    <meta name="twitter:image"      content="%PUBLIC_URL%/icons/icon-512.png" />

    <!-- ── PWA Manifest ─────────────────────────────────────────── -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Preconnect hints ─────────────────────────────────────── -->
    <!-- Supabase & OpenAI URLs are injected at runtime via env    -->
    <!-- vars — do NOT hardcode them here.                         -->

    <!-- ── Page title ───────────────────────────────────────────── -->
    <title>Stomaboard</title>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.  The build step will inject the
      bundled scripts and stylesheets into the <body> tag automatically.

      Tailwind CSS is processed at build time via PostCSS – the CDN
      script is intentionally absent.  To start development run:
        npm start
      To create a production build run:
        npm run build
    -->
  </body>
</html>
