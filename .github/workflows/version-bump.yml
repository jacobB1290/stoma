name: Bump Version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Determine bump + release priority
        run: |
          COMMIT_MSG=$(git log --oneline -1 --format="%s")
          echo "Last commit: $COMMIT_MSG"

          if echo "$COMMIT_MSG" | grep -qi "BREAKING"; then
            echo "BUMP=major" >> $GITHUB_ENV
          elif echo "$COMMIT_MSG" | grep -qiE "^(feat|feature|new)(\(|:)"; then
            echo "BUMP=minor" >> $GITHUB_ENV
          else
            echo "BUMP=patch" >> $GITHUB_ENV
          fi

          if echo "$COMMIT_MSG" | grep -qiE "urgent|hotfix|critical|security"; then
            echo "RELEASE_PRIORITY=urgent" >> $GITHUB_ENV
          else
            echo "RELEASE_PRIORITY=standard" >> $GITHUB_ENV
          fi

      - name: Bump version
        run: |
          npm version ${{ env.BUMP }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "New version: $VERSION"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 0
          fi
          git commit -m "chore: bump to v$(node -p \"require('./package.json').version\") [skip ci]"
          git push origin HEAD:main
